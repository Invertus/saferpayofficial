version: "3.7"

services:
  mysql:
    #platform: linux/amd64
    container_name: mysql-saferpayofficial-1785
    image: mysql:latest
    ports:
      - "9002:3306"
    environment:
      MYSQL_ROOT_PASSWORD: prestashop
      MYSQL_DATABASE: prestashop
    restart: always
    healthcheck:
      test: "mysqladmin ping -h127.0.0.1 -uroot -pprestashop --silent"
      interval: 10s
    networks:
      - prestashop_saferpayofficial_net_1785

  prestashop-17:
    #platform: linux/amd64
    container_name: prestashop-saferpayofficial-1785
    build:
      context: .
      dockerfile: .docker/Dockerfile.1785
    environment:
      PS_INSTALL_AUTO: 1
      PS_ENABLE_SSL: 1
      DB_PASSWD: prestashop
      DB_NAME: prestashop
      DB_SERVER: mysql
      PS_DOMAIN: saferpayofficial1785debug.ngrok.io
      PS_FOLDER_INSTALL: install
      PS_FOLDER_ADMIN: admin1
    depends_on:
      - mysql
    ports:
      - "8002:80"
    volumes:
      - ./:/var/www/html/modules/saferpayofficial
    networks:
      - prestashop_saferpayofficial_net_1785
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://localhost:80 || exit 1"
      interval: 10s

  mailhog:
    image: mailhog/mailhog
    container_name: saferpayofficial_mailhog
    logging:
      driver: 'none'
    ports:
      - "1025:1025"
      - "8025:8025"

  adminer:
    image: adminer
    restart: always
    ports:
      - '6969:8080'
    networks:
      - prestashop_saferpayofficial_net_1785

networks:
  prestashop_saferpayofficial_net_1785:
    name: 'prestashop_saferpayofficial_net_1785'
